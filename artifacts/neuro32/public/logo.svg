      <stop offset="0%" stop-color="#f0a500" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#0a0a12" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="line-ab" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f0a500" stop-opacity="0.6"/>
