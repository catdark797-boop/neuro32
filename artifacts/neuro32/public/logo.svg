  <circle cx="24" cy="10" r="7" fill="none" stroke="#f0a500" stroke-width="0.8" stroke-opacity="0.3"/>
  <circle cx="10" cy="38" r="3" fill="#4a7cff"/>
  <circle cx="38" cy="38" r="3" fill="rgba(255,255,255,0.85)"/>
