[build]
builder = "DOCKERFILE"
dockerfilePath = "artifacts/api-server/Dockerfile"

[deploy]
# `-euc` aborts boot on migration failure (fail-fast) so we never run against
# a stale schema. HOME=/tmp so npx can write its cache as non-root appuser.
startCommand = "sh -euc 'export HOME=/tmp; echo \">>> drizzle-kit push\"; cd /app/lib/db && npx --no-install drizzle-kit push --force --config ./drizzle.config.ts; echo \">>> starting server\"; cd /app && exec node --enable-source-maps ./dist/index.mjs'"
healthcheckPath = "/api/healthz"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
