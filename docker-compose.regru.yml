services:
  api:
    build:
      context: .
      dockerfile: artifacts/api-server/Dockerfile
    restart: unless-stopped
    env_file:
      - artifacts/api-server/.env
    environment:
      NODE_ENV: production
      PORT: "3000"
    expose:
      - "3000"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/api/healthz || exit 1"]
      interval: 10s
      timeout: 3s
      start_period: 10s
      retries: 3

  web:
    build:
      context: .
      dockerfile: artifacts/neuro32/Dockerfile
    restart: unless-stopped
    expose:
      - "80"

  caddy:
    image: caddy:2
    restart: unless-stopped
    depends_on:
      - api
      - web
    env_file:
      - .env.regru
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
