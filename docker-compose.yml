# ─────────────────────────────────────────────────────────────────────────────
# Local development helper.
# Usage:
#   docker compose up -d
#   docker compose logs -f api
# ─────────────────────────────────────────────────────────────────────────────

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: neuro32
      POSTGRES_USER: neuro32
      POSTGRES_PASSWORD: localdev_password
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U neuro32"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: .
      dockerfile: artifacts/api-server/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - artifacts/api-server/.env          # copy .env.example → .env and fill in values
    environment:
      DATABASE_URL: postgresql://neuro32:localdev_password@postgres:5432/neuro32
      PORT: "3000"
      NODE_ENV: development
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/api/healthz || exit 1"]
      interval: 10s
      timeout: 3s
      start_period: 10s
      retries: 3

volumes:
  pgdata:
